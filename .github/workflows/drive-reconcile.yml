name: Drive Reconcile Fallback

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secret
        env:
          RECONCILE_URL: ${{ secrets.DRIVE_RECONCILE_URL }}
        run: |
          if [ -z "$RECONCILE_URL" ]; then
            echo "Missing DRIVE_RECONCILE_URL secret."
            exit 1
          fi

      - name: Trigger reconcile endpoint
        env:
          RECONCILE_URL: ${{ secrets.DRIVE_RECONCILE_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          tmp_body="$(mktemp)"
          if [ -n "$SYNC_SECRET" ]; then
            status_code="$(curl -sSL -o "$tmp_body" -w "%{http_code}" -X POST "$RECONCILE_URL" -H "x-sync-secret: $SYNC_SECRET")"
          else
            status_code="$(curl -sSL -o "$tmp_body" -w "%{http_code}" -X POST "$RECONCILE_URL")"
          fi

          cat "$tmp_body"
          echo

          if [ "$status_code" = "200" ]; then
            exit 0
          fi

          if [ "$status_code" = "500" ] && grep -q "Missing required environment variable" "$tmp_body"; then
            echo "Drive sync env vars are not configured yet; skipping reconcile failure."
            exit 0
          fi

          echo "Reconcile failed with status code: $status_code"
          exit 1
